      <main class="panier">
        <br><br><br><br><br><br><br><br>
        <h1>Your Basket <i class="icon icon-basket"></i></h1>

        <div id="cart"></div>

        <div class="basket">
          <button class="btn_1">Buy</button>
          <h1 id="total" style="text-align:center;"></h1>
          <button class="btn_1"  id="clear-cart">Empty</button>
        </div>

      </main>

      <footer>
        <a href="Basket.html"><img id="logo_foot" src="https://i.postimg.cc/3J1sByP2/logo.png" alt="Beaking Bad"></a>
            <article class="foot_cont">
                <p>Website developed by Bring'eat using HTML and CSS.</p>
                <p>&copy Bring'eat 2026</p>
            </article>

            <article class="resaux">
              <img src="https://cdn-icons-png.flaticon.com/128/3955/3955024.png" alt="">
              <img src="https://cdn-icons-png.flaticon.com/128/5968/5968764.png" alt="">
              <img src="https://cdn-icons-png.flaticon.com/128/5969/5969020.png" alt="">
            </article>
      </footer>

      <!--gestion du panier-->
      <script>
      // On récupère le panier ou un objet vide
let cart = JSON.parse(localStorage.getItem("cart")) || {};

const cartContainer = document.getElementById("cart");
const totalDisplay = document.getElementById("total");

function displayCart() {
    cartContainer.innerHTML = "";
    let total = 0;

    // On transforme l'objet en tableau pour boucler dessus
    Object.keys(cart).forEach(id => {
        const item = cart[id];
        total += item.price * item.qty;

        let div = document.createElement("div");
        div.className = "cart-item";

        // Ajout des boutons + et - avec des fonctions onclick
        div.innerHTML = `
            <img src="${item.img}" style="width:50px;">
            <div>
              <h3>${item.name}</h3>
              <p>${item.price} €</p>
            </div>
            <div class="qty-controls">
                <button onclick="changeQty('${id}', -1)">-</button>
                <span>${item.qty}</span>
                <button onclick="changeQty('${id}', 1)">+</button>
            </div>
        `;
        cartContainer.appendChild(div);
    });

    totalDisplay.textContent = "Total : " + total.toFixed(2) + " €";
}

// Nouvelle fonction pour modifier la quantité
function changeQty(id, delta) {
    if (cart[id]) {
        cart[id].qty += delta;

        // Si la quantité tombe à 0 ou moins, on supprime l'article
        if (cart[id].qty <= 0) {
            delete cart[id];
        }

        // Sauvegarde dans le localStorage
        localStorage.setItem("cart", JSON.stringify(cart));
        
        // On rafraîchit l'affichage
        displayCart();
    }
}

// Initialisation au chargement
displayCart();
      </script>

      <!--Vider le panier-->
      <script>
          document.getElementById("clear-cart").addEventListener("click", () => {
          localStorage.removeItem("cart");
          cart = {}; // On vide aussi la variable locale
          displayCart(); // On rafraîchit l'affichage proprement
      });
      </script>

       <!--menu apparaitre/dispraitre-->
      <script>
        var prevScrollpos = window.pageYOffset;
        window.onscroll = function() {
        var currentScrollPos = window.pageYOffset;
          if (prevScrollpos > currentScrollPos) {
            document.getElementById("menu").style.top = "0";
          } else {
            document.getElementById("menu").style.top = "-170px";
          }
          prevScrollpos = currentScrollPos;
        }

        window.onload = function() {
        document.getElementById("menu").style.top = "0";
        }
      </script>
    </body>
